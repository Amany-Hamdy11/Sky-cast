<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="dashboard.css">
  <title>Weather Dashboard</title>
</head>
<body>
  <div class="dashboard">
    <div class="dashboard-head">
      <div>
        <p class="page-kicker">Weekly Weather</p>
        <h1 class="page-title">SkyCast</h1>
      </div>
      <p class="page-subtitle">Choose a day to update the whole dashboard.</p>
    </div>

    <div class="day-selector" id="daySelector">
      <button class="day-chip active" type="button" data-day="sun">Sun</button>
      <button class="day-chip" type="button" data-day="mon">Mon</button>
      <button class="day-chip" type="button" data-day="tue">Tue</button>
      <button class="day-chip" type="button" data-day="wed">Wed</button>
      <button class="day-chip" type="button" data-day="thu">Thu</button>
      <button class="day-chip" type="button" data-day="fri">Fri</button>
      <button class="day-chip" type="button" data-day="sat">Sat</button>
    </div>

    <div class="top">
      <div class="hero-column">
        <aside class="user-card">
          <div class="user-avatar">👤</div>
          <div class="user-meta">
            <h2 class="user-name">Clayton Walter</h2>
            <p class="user-role">Traveler • Assiut, Egypt</p>
          </div>
        </aside>

        <div class="hero-weather">
          <p class="city-name" id="cityName">Assiut</p>
          <div class="temp-box" id="mainTemp">24°C</div>
          <div class="condition" id="mainCondition">
            <img class="weather-icon" src="clouds.png" alt="Partly Cloudy">
            Partly Cloudy
          </div>
        </div>
      </div>

      <div class="hours" id="hoursContainer"></div>
    </div>

    <div class="section">
      <div class="cards">
        <div class="card">
          <h3 class="card-heading">
            <img class="section-icon" src="temperature.png" alt="Temperature icon">
            <span>Temperature</span>
          </h3>
          <div class="chart" id="temperatureChart"></div>
        </div>

        <div class="card">
          <h3 class="card-heading">
            <img class="section-icon" src="humidity.png" alt="Humidity icon">
            <span>Humidity</span>
          </h3>
          <div class="chart" id="humidityChart"></div>
        </div>

        <div class="card">
          <h3 class="card-heading">
            <img class="section-icon" src="heavy-rain.png" alt="Rain icon">
            <span>Rain</span>
          </h3>
          <div class="chart" id="rainChart"></div>
        </div>
      </div>
    </div>

    <div class="section overview">
      <div class="small-box">
        <div class="label label-with-icon">
          <img class="section-icon small-section-icon" src="wind.png" alt="Wind icon">
          <span>Wind Status</span>
        </div>
        <div class="value" id="windValue">8 km/h</div>
      </div>

      <div class="small-box">
        <div class="label label-with-icon">
          <img class="section-icon small-section-icon" src="uv-index.png" alt="UV icon">
          <span>UV Index</span>
        </div>
        <div class="value" id="uvValue">5.5</div>
        <div class="gauge-wrap">
          <div class="gauge">
            <div class="gauge-fill" id="uvGaugeFill"></div>
          </div>
        </div>
      </div>

      <div class="small-box">
        <div class="label label-with-icon">
          <img class="section-icon small-section-icon" src="sunset.png" alt="Sunrise sunset icon">
          <span>Sunrise / Sunset</span>
        </div>
        <div class="time-block">
          Sunrise: <strong id="sunriseValue" style="font-size:16px;">6:12 AM</strong><br>
          Sunset: <strong id="sunsetValue" style="font-size:16px;">5:48 PM</strong>
        </div>
      </div>
    </div>
  </div>

  <script src="dashbored.js"></script>
</body>
</html>
