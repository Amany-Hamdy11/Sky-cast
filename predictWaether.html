<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="predictWeather.css">
  <title>Weather Prediction</title>


</head>
<body>

  <div class="container">

    <!-- العنوان -->
    <div class="header">
      <span class="icon">🌤️</span>
      <h1>Prediction Your Weather Today</h1>
    </div>

    <!-- الفورم -->
    <form id="predictForm">
      <div class="form-grid">

        <div class="input-box">
          <label>City</label>
          <input type="text" id="city" placeholder="Enter city name" required>
        </div>

        <div class="input-box">
          <label>Day</label>
          <select id="day" required>
            <option value="today">Today</option>
            <option value="tomorrow">Tomorrow</option>
            <option value="after_tomorrow">After Tomorrow</option>
          </select>
        </div>

      </div>

      <!-- الأزرار -->
      <div class="buttons">
        <button type="submit" class="submit-btn">Predict</button>
        <button type="reset" class="clean-btn" id="cleanBtn">Clean</button>
      </div>
    </form>

    <!-- صندوق النتيجة -->
    <div class="result-box" id="resultBox">
      <h2 class="result-title">Prediction Result</h2>

      <div id="resultContent">
        <div class="loading">Enter city and day, then click Predict.</div>
      </div>
    </div>

  </div>

  
<script src="predictWeather.js"></script>
</body>
</html>
